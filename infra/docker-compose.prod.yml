version: "3.9"

# ── Production override compose ───────────────────────────────────────────────
# Usage: docker compose -f docker-compose.yml -f infra/docker-compose.prod.yml up -d

services:
  db:
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_me_in_prod}
      MYSQL_DATABASE: aaie
      MYSQL_USER: aaie_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me_in_prod}
    volumes:
      - db_data_prod:/var/lib/mysql

  backend:
    restart: always
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: mysql+asyncmy://aaie_user:${MYSQL_PASSWORD:-change_me_in_prod}@db:3306/aaie
      SECRET_KEY: ${SECRET_KEY:-change_this_to_a_long_random_string_in_prod}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://yourdomain.com}
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  frontend:
    restart: always
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend

volumes:
  db_data_prod:
